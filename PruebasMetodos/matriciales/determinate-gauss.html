<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Determinante por Gauss</title>

<!-- Math.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.4.1/math.min.js"></script>

<!-- JQuery -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

<!-- MathQuill -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/mathquill/0.10.1/mathquill.min.css"/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mathquill/0.10.1/mathquill.min.js"></script>

<!-- MathJax -->
<script>
window.MathJax = {
    tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']]
    }
};
</script>

<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#0f172a;
    color:white;
    min-height:100vh;
    padding:30px;
}

h1{
    text-align:center;
    margin-bottom:25px;
    font-size:2.4rem;
}

.panel{
    max-width:1200px;
    margin:auto;
    background:#1e293b;
    padding:25px;
    border-radius:18px;
    box-shadow:0 0 25px rgba(0,0,0,0.3);
}

.controls{
    display:flex;
    gap:15px;
    align-items:center;
    flex-wrap:wrap;
    margin-bottom:25px;
}

.controls label{
    font-size:18px;
}

#size{
    width:80px;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#334155;
    color:white;
    font-size:16px;
}

button{
    padding:11px 18px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    cursor:pointer;
    font-size:15px;
    transition:0.2s;
}

button:hover{
    background:#1d4ed8;
    transform:translateY(-2px);
}

#matrixContainer{
    display:grid;
    gap:10px;
    justify-content:start;
    margin-top:25px;
}

.matrix-row{
    display:flex;
    gap:10px;
}

.math-field{
    min-width:90px;
    min-height:55px;
    background:#475569;
    border-radius:10px;
    padding:12px;
    color:white;
    font-size:24px;
    display:flex;
    align-items:center;
    overflow-x:auto;
    border:2px solid transparent;
    transition:0.2s;
}

.math-field:focus-within{
    background:#64748b;
    border-color:#3b82f6;
}

.mq-editable-field{
    width:100%;
}

.info{
    margin-top:15px;
    color:#94a3b8;
    line-height:1.8;
}

.resultado{
    margin-top:35px;
}

.paso{
    margin-top:25px;
    background:#0f172a;
    padding:22px;
    border-radius:15px;
    border:1px solid #334155;
}

.paso h3{
    color:#60a5fa;
    margin-bottom:12px;
}

.operacion{
    margin-bottom:18px;
    color:#cbd5e1;
}

.latex-matrix{
    overflow-x:auto;
    padding:10px;
}

.det{
    margin-top:35px;
    padding:18px;
    border-radius:12px;
    background:#14532d;
    color:#86efac;
    font-size:24px;
    font-weight:bold;
    text-align:center;
}

/* MathQuill color */
.mq-root-block{
    color:white !important;
}

.mq-math-mode .mq-supsub{
    color:#93c5fd !important;
}

</style>
</head>

<body>

<h1>Determinante por Gauss</h1>

<div class="panel">

    <div class="controls">

        <label>Tamaño:</label>

        <input
            type="number"
            id="size"
            min="2"
            max="6"
            value="3"
        >

        <button onclick="crearMatriz()">
            Crear Matriz
        </button>

        <button onclick="resolver()">
            Resolver
        </button>

    </div>

    <div class="info">

        Puedes escribir expresiones matemáticas:

        <br><br>

        • Fracciones: <b>1/2</b>

        <br>

        • Potencias: <b>x^2</b>

        <br>

        • Raíces: <b>sqrt(2)</b>

        <br>

        • Pi: <b>pi</b>

        <br>

        • Euler: <b>e</b>

    </div>

    <div id="matrixContainer"></div>

    <div id="resultado" class="resultado"></div>

</div>

<script>

const MQ = MathQuill.getInterface(2);

window.mathFields = [];

crearMatriz();

function crearMatriz(){

    const n =
        parseInt(document.getElementById("size").value);

    const container =
        document.getElementById("matrixContainer");

    container.innerHTML = "";

    mathFields = [];

    for(let i=0;i<n;i++){

        const row = document.createElement("div");

        row.className = "matrix-row";

        mathFields[i] = [];

        for(let j=0;j<n;j++){

            const wrapper =
                document.createElement("div");

            wrapper.className = "math-field";

            wrapper.id = `mq-${i}-${j}`;

            row.appendChild(wrapper);

            const field =
                MQ.MathField(wrapper, {

                spaceBehavesLikeTab: true,

                autoCommands:
                    'pi sqrt theta alpha beta gamma',

                autoOperatorNames:
                    'sin cos tan log ln sqrt',

                handlers: {

                    edit: function(){}
                }
            });

            field.latex('0');

            mathFields[i][j] = field;
        }

        container.appendChild(row);
    }
}

function latexAMathjs(latex){

    return latex

        .replace(/\\\\frac\\{([^}]*)\\}\\{([^}]*)\\}/g,
            '($1)/($2)')

        .replace(/\\\\sqrt\\{([^}]*)\\}/g,
            'sqrt($1)')

        .replace(/\\\\pi/g,
            'pi')

        .replace(/\\\\left/g, '')

        .replace(/\\\\right/g, '');
}

function obtenerMatriz(){

    const n =
        parseInt(document.getElementById("size").value);

    let matriz = [];

    for(let i=0;i<n;i++){

        let fila = [];

        for(let j=0;j<n;j++){

            try{

                let latex =
                    mathFields[i][j].latex();

                let expresion =
                    latexAMathjs(latex);

                let valor =
                    math.evaluate(expresion);

                fila.push(valor);

            }catch{

                alert(
                    `Error en fila ${i+1}, columna ${j+1}`
                );

                return null;
            }
        }

        matriz.push(fila);
    }

    return matriz;
}

function copiarMatriz(A){

    return A.map(fila => [...fila]);
}

function determinanteConPasos(matriz){

    const n = matriz.length;

    let A = copiarMatriz(matriz);

    let pasos = [];

    pasos.push({

        descripcion:"Matriz inicial",

        matriz:copiarMatriz(A)
    });

    let det = 1;

    let intercambios = 0;

    for(let i=0;i<n;i++){

        let pivote = i;

        for(let j=i+1;j<n;j++){

            if(
                Math.abs(A[j][i]) >
                Math.abs(A[pivote][i])
            ){

                pivote = j;
            }
        }

        if(Math.abs(A[pivote][i]) < 1e-10){

            return {

                determinante:0,

                pasos
            };
        }

        if(pivote !== i){

            [A[i], A[pivote]] =
            [A[pivote], A[i]];

            intercambios++;

            pasos.push({

                descripcion:
                `Intercambio F${i+1} ↔ F${pivote+1}`,

                matriz:copiarMatriz(A)
            });
        }

        for(let j=i+1;j<n;j++){

            let factor =
                A[j][i] / A[i][i];

            for(let k=i;k<n;k++){

                A[j][k] -=
                    factor * A[i][k];
            }

            pasos.push({

                descripcion:
                `F${j+1} → F${j+1} - (${factor.toFixed(4)})F${i+1}`,

                matriz:copiarMatriz(A)
            });
        }
    }

    for(let i=0;i<n;i++){

        det *= A[i][i];
    }

    if(intercambios % 2 !== 0){

        det *= -1;
    }

    return {

        determinante:det,

        pasos
    };
}

function numeroALatex(num){

    if(Math.abs(num) < 1e-10){

        return "0";
    }

    try{

        let frac =
            math.fraction(num);

        if(frac.d !== 1){

            return `\\frac{${frac.s * frac.n}}{${frac.d}}`;
        }

        return frac.s * frac.n;

    }catch{

        return Number(num.toFixed(4));
    }
}

function matrizALatex(A){

    let latex = "\\begin{bmatrix}";

    for(let i=0;i<A.length;i++){

        let fila = A[i]

            .map(numeroALatex)

            .join(" & ");

        latex += fila;

        if(i < A.length - 1){

            latex += " \\\\ ";
        }
    }

    latex += "\\end{bmatrix}";

    return latex;
}

function resolver(){

    const matriz = obtenerMatriz();

    if(!matriz) return;

    const resultado =
        determinanteConPasos(matriz);

    const contenedor =
        document.getElementById("resultado");

    contenedor.innerHTML = "";

    resultado.pasos.forEach((paso,index)=>{

        contenedor.innerHTML += `

        <div class="paso">

            <h3>
                Paso ${index}
            </h3>

            <div class="operacion">
                ${paso.descripcion}
            </div>

            <div class="latex-matrix">
                $$${matrizALatex(paso.matriz)}$$
            </div>

        </div>
        `;
    });

    contenedor.innerHTML += `

    <div class="det">

        $$\\det(A)=${numeroALatex(resultado.determinante)}$$

    </div>
    `;

    MathJax.typeset();
}

</script>

</body>
</html>
